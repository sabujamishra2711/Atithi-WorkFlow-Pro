services:
  - type: web
    name: atithi-workflow-pro
    env: node
    plan: free
    buildCommand: npm ci && npm run build:render
    startCommand: npm run start:render
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: PORT
        value: 8000
      - key: CORS_ORIGIN
        value: https://atithi-workflow-pro.onrender.com,http://localhost:3000
      - key: NEXT_PUBLIC_API_URL
        value: /api/v1
      - key: MONGODB_URI
        sync: false
      - key: ACCESS_TOKEN_SECRET
        sync: false
      - key: REFRESH_TOKEN_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
